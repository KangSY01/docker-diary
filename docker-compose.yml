services:
  app1:
    build: ./app
    environment:
      - SERVER_ID=1
      - DATABASE_URL=postgresql://diary_user:diary_pass@db:5432/diary_db
    depends_on:
      - db

  app2:
    build: ./app
    environment:
      - SERVER_ID=2
      - DATABASE_URL=postgresql://diary_user:diary_pass@db:5432/diary_db
    depends_on:
      - db

  app3:
    build: ./app
    environment:
      - SERVER_ID=3
      - DATABASE_URL=postgresql://diary_user:diary_pass@db:5432/diary_db
    depends_on:
      - db

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=diary_user
      - POSTGRES_PASSWORD=diary_pass
      - POSTGRES_DB=diary_db
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: