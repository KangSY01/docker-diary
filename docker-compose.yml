version: '3'
services:
  app1:
    build: ./app
    environment:
      - SERVER_ID=1

  app2:
    build: ./app
    environment:
      - SERVER_ID=2

  app3:
    build: ./app
    environment:
      - SERVER_ID=3

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3